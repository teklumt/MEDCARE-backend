version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medcare-admin-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    networks:
      - medcare-network

  mongo:
    image: mongo:7
    container_name: medcare-admin-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: medcare_admin
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - medcare-network

volumes:
  mongo_data:

networks:
  medcare-network:
    driver: bridge
